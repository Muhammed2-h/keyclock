# Railway deployment for Keycloak + PostgreSQL
# Deploy instructions: https://docs.railway.app

services:
  keycloak:
    build: .
    ports:
      - "8080:8080"
    environment:
      # ── Database ──────────────────────────────────────────────────────
      KC_DB: postgres
      # Railway PostgreSQL plugin exposes these variable references automatically
      KC_DB_URL: jdbc:postgresql://${{Postgres.PGHOST}}:${{Postgres.PGPORT}}/${{Postgres.PGDATABASE}}
      KC_DB_USERNAME: ${{Postgres.PGUSER}}
      KC_DB_PASSWORD: ${{Postgres.PGPASSWORD}}

      # ── Hostname ──────────────────────────────────────────────────────
      # Railway sets RAILWAY_PUBLIC_DOMAIN automatically
      # NOTE: bare domain only – NO https:// prefix (Keycloak 26 rejects full URLs)
      KC_HOSTNAME: ${{RAILWAY_PUBLIC_DOMAIN}}

      # ── Admin user (set via Railway secret variables) ─────────────────
      KEYCLOAK_ADMIN: ${{KEYCLOAK_ADMIN}}
      KEYCLOAK_ADMIN_PASSWORD: ${{KEYCLOAK_ADMIN_PASSWORD}}

      # ── Proxy (Railway terminates TLS at edge) ────────────────────────
      KC_HTTP_ENABLED: "true"
      KC_PROXY_HEADERS: xforwarded

      # ── Observability ─────────────────────────────────────────────────
      KC_HEALTH_ENABLED: "true"
      KC_METRICS_ENABLED: "true"

      # ── Performance tuning ────────────────────────────────────────────
      KC_LOG_LEVEL: WARN
      KC_CACHE: local
      KC_DB_POOL_INITIAL_SIZE: "5"
      KC_DB_POOL_MIN_SIZE: "5"
      KC_DB_POOL_MAX_SIZE: "15"
      JAVA_OPTS_APPEND: "-Xms256m -Xmx384m -XX:+UseG1GC -XX:MaxGCPauseMillis=100 -XX:+UseStringDeduplication -Djava.net.preferIPv4Stack=true"
    depends_on:
      - postgres
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health/ready"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: ${{POSTGRES_PASSWORD}}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
